spring.application.name=rewards


spring.datasource.url=jdbc:postgresql://localhost:5432/quickbuy
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver

# Rewards Configuration
rewards.tier1.threshold=50
rewards.tier1.points=1

rewards.tier2.threshold=100
rewards.tier2.points=2

# Number of months to calculate rewards
rewards.numberOfMonths=3